<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python Calculator</title>
    <link rel="stylesheet" href="https://pyscript.net/releases/2026.7.2/core.css" />
    <script type="module" src="https://pyscript.net/releases/2026.7.2/core.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <script type="py" src="./script/main.py"></script>
    <div id="calculator">
        <div class="screen">
            <div id="show"></div>
        </div>
        <div class="buttons">
            <table>
                <tr>
                    <td>
                        <button class="button-top" id="delete">delete</button>
                        <button class="button-top" id="clear">AC</button>
                        <button class="button-right" id="division">/</button>
                    </td>
                </tr>
                <tr>
                    <td>
                        <button class="button" id="7">7</button>
                        <button class="button" id="8">8</button>
                        <button class="button" id="9">9</button>
                        <button class="button-right" id="X">X</button>
                    </td>
                </tr>
                <tr>
                    <td>
                        <button class="button" id="4">4</button>
                        <button class="button" id="5">5</button>
                        <button class="button" id="6">6</button>
                        <button class="button-right" id="minus">-</button>
                    </td>
                </tr>
                <tr>
                    <td>
                        <button class="button" id="1">1</button>
                        <button class="button" id="2">2</button>
                        <button class="button" id="3">3</button>
                        <button class="button-right" id="plus">+</button>
                    </td>
                </tr>
                <tr>
                    <td>
                        <button class="button" id="zero">0</button>
                        <button class="button" id="point">.</button>
                        <button class="button-right" id="equal">=</button>
                    </td>
                </tr>
            </table>
        </div>
    </div>
</body>
</html>
